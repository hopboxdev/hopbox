syntax = "proto3";

package mesa.v1;

import "google/protobuf/empty.proto";

// The public Mesa control-plane API. M1 = CRUD + interactive shell.
service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (Workspace);
  rpc GetWorkspace(GetWorkspaceRequest) returns (Workspace);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (google.protobuf.Empty);
  rpc Shell(stream ShellClientMsg) returns (stream ShellServerMsg);
  rpc Exec(ExecRequest) returns (stream ExecServerMsg);
}

message Workspace {
  string id = 1;
  string tenant_id = 2;
  string owner = 3;
  string name = 4;
  string image_ref = 5;
  int64  mem_mb = 6;
  string phase = 7;
  bool   agent_connected = 8;
  string message = 9;
  repeated Endpoint endpoints = 10; // resolved ingress endpoints (status)
}

// IngressPort is a desired exposed port (spec); Endpoint is its resolved address (status).
message IngressPort {
  string name = 1;
  int32  port = 2;
}
message Endpoint {
  string name = 1;
  string url = 2;
  int32  port = 3;
}

message CreateWorkspaceRequest {
  string name = 1;
  string image_ref = 2;
  int64  mem_mb = 3;
  repeated IngressPort ingress = 4; // ports to expose at the gateway
}
message GetWorkspaceRequest { string name_or_id = 1; }
message ListWorkspacesRequest {}
message ListWorkspacesResponse { repeated Workspace workspaces = 1; }
message DeleteWorkspaceRequest { string name_or_id = 1; }

// Shell bidi stream. First client msg MUST be `open`. Then `data`/`resize`.
message ShellClientMsg {
  oneof msg {
    OpenShell open = 1;
    bytes     data = 2;
    Resize    resize = 3;
  }
}
message OpenShell {
  string name_or_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
  string cmd = 4; // optional; "" => agent default shell
}
message Resize { uint32 cols = 1; uint32 rows = 2; }

message ShellServerMsg {
  oneof msg {
    bytes data = 1;
    int32 exit_code = 2;
  }
}

// Exec runs a non-interactive command in a workspace (no pty). The server
// streams stdout/stderr as they arrive, then a final exit_code.
message ExecRequest {
  string name_or_id = 1;
  repeated string cmd = 2; // argv; run directly (use sh -c '...' for shell features)
}
message ExecServerMsg {
  oneof msg {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
  }
}
