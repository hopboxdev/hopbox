syntax = "proto3";

package mesa.provider.v1;

// Build resolves a workspace source (devcontainer, Dockerfile, nix flake, or a
// prebuilt image) to an OCI image reference. The output is ALWAYS an image ref,
// so Build is fully decoupled from Compute: every Compute provider consumes a
// ref (load locally or pull). Status supports async builds.
service Build {
  rpc Resolve (BuildRequest) returns (ImageRef);
  rpc Status  (BuildRef)     returns (BuildStatus);
}

message BuildRequest {
  string workspace_id = 1;
  string source_ref = 2;            // git URL | path | image ref (for prebuilt)
  string provider = 3;              // devcontainer | dockerfile | nix | prebuilt
  map<string, string> options = 4;  // provider-specific knobs
  string tenant_id = 5;
}

message ImageRef {
  string ref = 1;        // the resolved OCI image reference (always set on success)
  string build_ref = 2;  // handle to poll Status for async builds ("" if synchronous)
}

message BuildRef {
  string build_ref = 1;
}

message BuildStatus {
  string phase = 1;      // pending | building | ready | failed
  string image_ref = 2;  // set once phase == ready
  string message = 3;
}
