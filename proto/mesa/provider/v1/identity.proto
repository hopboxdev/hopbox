syntax = "proto3";

package mesa.provider.v1;

// Identity authenticates a credential to a Principal and authorizes actions.
// The Principal carries tenant_id — this is the seam a hyperscaler uses to map
// their SSO/customer model onto Mesa tenants without forking the core.
service Identity {
  rpc Authenticate (Credential)    returns (Principal);
  rpc Authorize    (AccessRequest) returns (Decision);
}

message Credential {
  string scheme = 1;  // "api-key" | "oidc-token"
  string value = 2;   // the key or token
}

message Principal {
  string id = 1;
  string tenant_id = 2;
  string display_name = 3;
  repeated string roles = 4;  // coarse RBAC: owner | tenant-admin | system
}

message AccessRequest {
  Principal principal = 1;
  string action = 2;    // e.g. "workspace.create"
  string resource = 3;  // e.g. a workspace id or tenant id
}

message Decision {
  bool allow = 1;
  string reason = 2;
}
