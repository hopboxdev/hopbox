syntax = "proto3";

package mesa.provider.v1;

// The remaining provider contracts are part of Mesa's design surface but are
// RESERVED until their milestone — no messages or generated code yet. They are
// documented here so the contract package is complete and reviewers see the
// full shape. Adapters are built in their milestones:
//   - Build    (M4): rpc Resolve(BuildRequest) returns (ImageRef); rpc Status(BuildRef) returns (BuildStatus);
//   - Identity (M4): rpc Authenticate(Credential) returns (Principal); rpc Authorize(AccessRequest) returns (Decision);
//   - Metering (M5): rpc Emit(stream UsageEvent) returns (Empty); rpc Quota(PrincipalRef) returns (QuotaState);
// Ingress (M3) is now real — see ingress.proto.
// Intentionally no service/message declarations here yet (declaring empty
// services would generate unused gRPC stubs).
