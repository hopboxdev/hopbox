syntax = "proto3";

package mesa.provider.v1;

import "mesa/provider/v1/compute.proto";

// Metering records usage and gates provisioning. Quota is a PRE-FLIGHT check the
// reconciler runs before Provision; Emit streams usage events (start/stop,
// cpu/mem-seconds, storage-GB, ...) to a backend (prometheus, billing ledger).
service Metering {
  rpc Emit  (stream UsageEvent) returns (Empty);
  rpc Quota (PrincipalRef)      returns (QuotaState);
}

message UsageEvent {
  string tenant_id = 1;
  string principal_id = 2;
  string workspace_id = 3;
  string kind = 4;        // workspace.start | workspace.stop | cpu_seconds | storage_mb | ...
  int64 value = 5;        // magnitude for metered kinds (seconds, MB, ...)
  int64 unix_millis = 6;  // event time
}

message PrincipalRef {
  string principal_id = 1;
  string tenant_id = 2;
}

message QuotaState {
  bool allowed = 1;          // PRE-FLIGHT: may this principal provision now?
  int64 workspaces_used = 2;
  int64 workspaces_limit = 3;
  string reason = 4;
}
// Empty is defined in compute.proto (same package).
