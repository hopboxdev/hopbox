name: release

# Cut a release by pushing a tag:  git tag v0.3.0 && git push origin v0.3.0
# GoReleaser (.goreleaser.yaml) builds the binaries, packages tar.gz archives
# (hopbox_<os>_<arch>, hopbox-server_linux_<arch>) + checksums, publishes the
# GitHub release, and pushes the Homebrew cask to hopboxdev/homebrew-tap.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create releases + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope on hopboxdev/homebrew-tap. If unset, the cask
          # push is skipped (see skip_upload in .goreleaser.yaml) and the release
          # still succeeds.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
