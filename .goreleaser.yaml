# goreleaser config — https://goreleaser.com
#   validate : goreleaser check
#   dry-run  : goreleaser release --snapshot --clean   (builds dist/, no publish)
# Released by .github/workflows/release.yml on a v* tag.
version: 2

project_name: hopbox

builds:
  # The hopbox daemon — the compute-box substrate (`ssh box@host`). Both compute
  # backends are compiled in; `--compute docker|microvm` selects at runtime.
  - id: hopboxd
    main: ./cmd/hopboxd
    binary: hopboxd
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: ["-tags=docker,firecracker"]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  # The AI-control plane client (MCP): ps glance, watch, --connect bridge.
  - id: hopbox-mcp
    main: ./cmd/hopbox-mcp
    binary: hopbox-mcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  # In-box agent (init → hub) and the in-box metadata client.
  - id: hopbox-agent
    main: ./cmd/hopbox-agent
    binary: hopbox-agent
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: box-guest
    main: ./cmd/box-guest
    binary: box-guest
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # The hopbox bundle — daemon + agent + box-guest + mcp, Linux. install-hopbox.sh
  # fetches this. (microVM also needs a golden rootfs; see build/microvm.)
  - id: hopbox
    ids: [hopboxd, hopbox-agent, box-guest, hopbox-mcp]
    name_template: "hopbox_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:", "^ci:", "Merge "]

release:
  github:
    owner: hopboxdev
    name: hopbox
  prerelease: auto
