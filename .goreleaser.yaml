# goreleaser config — https://goreleaser.com
#   validate : goreleaser check
#   dry-run  : goreleaser release --snapshot --clean   (builds dist/, no publish)
# Released by .github/workflows/release.yml on a v* tag.
version: 2

project_name: hopbox

builds:
  # Client CLI — the only binary shipped for macOS; Homebrew installs this one.
  - id: hopbox
    main: ./cmd/hopbox
    binary: hopbox
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  # Control plane — Linux only, needs the `docker` build tag.
  - id: hopboxd
    main: ./cmd/hopboxd
    binary: hopboxd
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: ["-tags=docker"]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: hopbox-gw
    main: ./cmd/hopbox-gw
    binary: hopbox-gw
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: hopbox-agent
    main: ./cmd/hopbox-agent
    binary: hopbox-agent
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  # Box daemon — the standalone compute-box product (`ssh box@host`). Both compute
  # backends are compiled in; `--compute docker|microvm` selects at runtime.
  - id: boxd
    main: ./cmd/boxd
    binary: boxd
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: ["-tags=docker,firecracker"]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

  # In-box metadata client (info / keep-alive / auto-suspend / idle / mcp).
  - id: box-guest
    main: ./cmd/box-guest
    binary: box-guest
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w"]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  # CLI archive — just `hopbox`, per os/arch. Unversioned name so install-cli.sh
  # and `/latest/download/` fetch it without resolving the version first.
  - id: cli
    ids: [hopbox]
    name_template: "hopbox_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

  # Server bundle — hopboxd + gw + agent, Linux only. install.sh fetches this.
  - id: server
    ids: [hopboxd, hopbox-gw, hopbox-agent]
    name_template: "hopbox-server_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

  # Box product bundle — boxd + the in-box agent + box-guest. install-boxd.sh
  # fetches this. (microVM also needs a golden rootfs; see build/microvm.)
  - id: box
    ids: [boxd, hopbox-agent, box-guest]
    name_template: "hopbox-box_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:", "^ci:", "Merge "]

# Homebrew cask (macOS) — `brew install hopboxdev/tap/hopbox`. Casks are the
# modern way to ship a pre-built binary (formulae are for source builds, and
# `brews` is deprecated). Linux users install via deploy/install-cli.sh.
homebrew_casks:
  - name: hopbox
    ids: [cli] # the CLI archive only
    repository:
      owner: hopboxdev
      name: homebrew-tap # requires repo hopboxdev/homebrew-tap + HOMEBREW_TAP_TOKEN
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Until the tap repo + HOMEBREW_TAP_TOKEN secret exist, skip the push so the
    # release still succeeds (binaries publish regardless). Auto-enables once set.
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    homepage: "https://hopbox.dev"
    description: "Self-hosted, vendor-neutral control plane for dev environments (CLI)"
    # The binary is unsigned, so strip the Gatekeeper quarantine bit on install
    # or macOS blocks it ("cannot be opened — unidentified developer").
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/hopbox"]
          end

release:
  github:
    owner: hopboxdev
    name: hopbox
  prerelease: auto
